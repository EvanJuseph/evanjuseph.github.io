<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EllenioFam</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#e0e5ec;
    color:#6b7280;
    transition:0.4s ease;
    overflow-x:hidden;
}

/* NAVBAR */

nav{
    position:fixed;
    top:0;
    width:100%;
    padding:20px;
    display:flex;
    justify-content:center;
    gap:40px;
    background:rgba(224,229,236,0.9);
    backdrop-filter:blur(10px);
    z-index:1000;

    box-shadow:
        5px 5px 10px #b8bec7,
        -5px -5px 10px #ffffff;
}

nav a{
    text-decoration:none;
    color:#5f6773;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    transform:scale(1.1);
}

/* PARALLAX */

.parallax{
    height:100vh;

    background-image:url('https://drive.google.com/thumbnail?id=12nqktCOyda-U9lIwtYvJFVTNhIuO_QfN&sz=w2000');

    background-attachment:fixed;
    background-position:center center;
    background-repeat:no-repeat;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;

    margin-bottom:20px;
}

.overlay{
    background:rgba(0,0,0,0.55);
    padding:40px;
    border-radius:25px;
    color:white;

    backdrop-filter:blur(5px);

    animation:fadeIn 1.5s ease;
}

.overlay h1{
    font-size:50px;
    margin-bottom:20px;
}

.overlay p{
    max-width:700px;
    line-height:1.8;
    font-size:18px;
}
