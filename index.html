<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Ellenio Family App.</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e0e5ec;
    overflow:hidden;
}

/* efek fade */
body.fade-out{
    animation:fadeOut 1s forwards;
}

@keyframes fadeOut{
    from{
        opacity:1;
        transform:scale(1);
    }
    to{
        opacity:0;
        transform:scale(1.1);
    }
}

.login-box{
    width:350px;
    padding:40px;
    border-radius:25px;
    background:#e0e5ec;
    box-shadow:
        10px 10px 20px #b8bec7,
        -10px -10px 20px #ffffff;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.login-box h2{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:15px;
    background:#e0e5ec;
    box-shadow:
        inset 5px 5px 10px #b8bec7,
        inset -5px -5px 10px #ffffff;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#e0e5ec;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    color:#333;
    box-shadow:
        5px 5px 10px #b8bec7,
        -5px -5px 10px #ffffff;
    transition:0.2s;
}

button:hover{
    transform:scale(0.98);
    box-shadow:
        inset 5px 5px 10px #b8bec7,
        inset -5px -5px 10px #ffffff;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#666;
    font-size:14px;
}

#error{
    color:red;
    text-align:center;
    margin-top:15px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>EllenioFam App</h2>

    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button onclick="login()">LOG IN</button>

    <div id="error"></div>

    <div class="footer">
        created by evanjusephca
    </div>
</div>

<script>
function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(username === "ellenio" && password === "admin1234"){

        // animasi transisi
        document.body.classList.add("fade-out");

        // pindah halaman setelah animasi selesai
        setTimeout(() => {
            window.location.href = "home.html";
        }, 1000);

    } else {

        document.getElementById("error").innerHTML =
        "Username atau Password salah!";

    }
}
</script>

</body>
</html>
